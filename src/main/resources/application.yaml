spring:
  application:
    name: app
  profiles:
    active: dev

app:
  storage:
    uploads-path: uploads
    reports-path: reports
  jwt:
    secret: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    expiration-minutes: 120
    cookie-name: JWT_TOKEN
  
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/demo-java
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 9000

---
spring:
  config:
    activate:
      on-profile: prod

server:
  port: 8083
