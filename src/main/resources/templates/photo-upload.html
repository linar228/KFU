<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Загрузка фото</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2937;
        }

        main {
            width: min(760px, calc(100% - 32px));
            margin: 32px auto;
            background: white;
            border: 1px solid #d9e0e8;
            border-radius: 8px;
            padding: 24px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        p {
            color: #667085;
        }

        input {
            display: block;
            width: 100%;
            margin-top: 16px;
            padding: 10px;
            border: 1px solid #d9e0e8;
            border-radius: 6px;
        }

        button,
        a {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            margin-top: 16px;
            border: 0;
            border-radius: 6px;
            padding: 0 14px;
            color: white;
            background: #0f766e;
            font: inherit;
            text-decoration: none;
            cursor: pointer;
        }

        a {
            margin-left: 8px;
            background: #475467;
        }

        ul {
            padding-left: 20px;
        }

        .message {
            color: #0f766e;
        }

        .error {
            color: #b42318;
        }
    </style>
</head>
<body>
<main>
    <h1 th:text="'Фото для инцидента #' + ${alert.id}">Фото для инцидента</h1>
    <p th:text="${alert.description}">Описание инцидента</p>

    <form th:action="@{/incidents/{id}/photos(id=${alert.id})}" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/*" required>
        <button type="submit">Загрузить фото</button>
    </form>

    <p class="message" th:if="${message}" th:text="${message}"></p>
    <p class="error" th:if="${error}" th:text="${error}"></p>

    <h2>Загруженные файлы</h2>
    <p th:if="${#lists.isEmpty(alert.photoUrls)}">Фото пока не загружены</p>
    <ul th:if="${!#lists.isEmpty(alert.photoUrls)}">
        <li th:each="photo : ${alert.photoUrls}" th:text="${photo}"></li>
    </ul>
</main>
</body>
</html>
